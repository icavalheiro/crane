name: Release Linux ARM64

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-linux-arm64-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Native AOT dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Publish linux-arm64 binary
        env:
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
        run: |
          dotnet publish src/Crane/Crane.csproj -c Release -r linux-arm64 --self-contained true /p:PublishSingleFile=true /p:StripSymbols=false -o artifacts/linux-arm64
          cp artifacts/linux-arm64/Crane artifacts/crane-linux-arm64
          chmod +x artifacts/crane-linux-arm64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-linux-arm64-${{ github.sha }}
          name: Crane main linux-arm64 ${{ github.sha }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: artifacts/crane-linux-arm64
