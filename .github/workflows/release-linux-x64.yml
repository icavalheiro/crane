name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Crane ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true

  build-linux-x64:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Native AOT dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Publish linux-x64 binary
        run: |
          dotnet publish src/Crane/Crane.csproj -c Release -r linux-x64 --self-contained true /p:PublishSingleFile=true -o artifacts/linux-x64
          cp artifacts/linux-x64/Crane artifacts/crane-linux-x64
          chmod +x artifacts/crane-linux-x64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/crane-linux-x64

  build-linux-arm64:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Native AOT dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Publish linux-arm64 binary
        env:
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
        run: |
          dotnet publish src/Crane/Crane.csproj -c Release -r linux-arm64 --self-contained true /p:PublishSingleFile=true /p:StripSymbols=false -o artifacts/linux-arm64
          cp artifacts/linux-arm64/Crane artifacts/crane-linux-arm64
          chmod +x artifacts/crane-linux-arm64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/crane-linux-arm64
