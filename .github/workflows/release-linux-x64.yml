name: Release Linux x64

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-linux-x64-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Native AOT dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Publish linux-x64 binary
        run: |
          dotnet publish src/Crane/Crane.csproj -c Release -r linux-x64 --self-contained true /p:PublishSingleFile=true -o artifacts/linux-x64
          cp artifacts/linux-x64/Crane artifacts/crane-linux-x64
          chmod +x artifacts/crane-linux-x64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-linux-x64-${{ github.sha }}
          name: Crane main linux-x64 ${{ github.sha }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: artifacts/crane-linux-x64
